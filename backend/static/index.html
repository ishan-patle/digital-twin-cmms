<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin CMMS</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- 3D Background Viewer -->
        <div id="viewer-container"></div>
        
        <!-- Glassmorphism Sidebar -->
        <div id="sidebar" class="glass-panel">
            <div class="sidebar-header">
                <h2>Facility CMMS</h2>
                <div class="status-indicator">
                    <div class="dot online"></div>
                    <span>Twin Active</span>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" id="tab-chat">Assistant</button>
                <button class="tab-btn" id="tab-docs">Docs</button>
            </div>

            <!-- Chat Assistant Section -->
            <div id="chat-section" class="tab-content active">
                <div id="chat-history">
                    <div class="message system">
                        <strong>Digital Twin:</strong> Access granted to SGD Blueberry HVAC Model. How can I assist with maintenance today?
                    </div>
                </div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="E.g., Locate the WWB 200 boiler..." autocomplete="off">
                    <button id="chat-send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>

            <!-- Document Manager Section -->
            <div id="doc-section" class="tab-content">
                <div class="upload-zone" id="upload-zone">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p>Drag Document Here</p>
                    <span class="subtext">Supports TXT, PDF</span>
                    <input type="file" id="file-input" style="display: none;">
                </div>
                <div id="upload-status"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/app.js"></script>
</body>
</html>
